<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#060914">
  <title>Publications · Communication Systems Research Group</title>
  <meta name="description" content="Peer-reviewed journal, conference, and patent publications from the Communication Systems Research Group at BRAC University.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="publications">
  <div id="site-header"></div>

  <main id="main">
    <section class="pagehead">
      <div class="wrap">
        <p class="eyebrow">Publications</p>
        <h1>Peer-reviewed research output.</h1>
        <p>Journal articles, conference papers, and patents across wireless, optical, and intelligent communication. Filter by type, author, or search by keyword.</p>
      </div>
    </section>

    <section class="section">
      <div class="wrap">
        <div class="pubtools">
          <div class="pubfilters" id="pubFilters">
            <div class="fgroup">
              <button class="fbtn is-on" data-filter="type:all">All types</button>
              <button class="fbtn" data-filter="type:journal">Journals</button>
              <button class="fbtn" data-filter="type:conference">Conferences</button>
              <button class="fbtn" data-filter="type:patent">Patents</button>
            </div>
            <div class="fgroup">
              <button class="fbtn is-on" data-filter="faculty:all">Everyone</button>
              <button class="fbtn" data-filter="faculty:saha">Saha</button>
              <button class="fbtn" data-filter="faculty:islam">Islam</button>
            </div>
          </div>
          <input type="search" class="pubsearch" id="pubSearch" placeholder="Search title, venue, author…" aria-label="Search publications">
        </div>

        <ul class="publist" id="allPubs"></ul>
        <p id="pubEmpty">No publications match those filters.</p>
        <nav class="pagination" id="pubPager" aria-label="Publications pages"></nav>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
